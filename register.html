<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="stylesheet" href="style.css">
</head>
<body id="register">
    <section align="center">
        <form>
            <h1>Register Now</h1>
    </section>
       <label for="f.name">Enter your First Name:</label>
        <input id="f.name" name="name" type="text" required placeholder="Example: Mazen">
        <br><br><br>
         <label for="l.name">Enter your Last Name:</label>
        <input id="l.name" name="name" type="text" required placeholder="Example: Morsy">
        <br>
         <label for="Email">Enter your Email:</label>
        <input id="Email" name="email" type="email" required placeholder="Example: ABC@gmail.com">
        <br>
        <label for="phone">Enter your Phone Number:</label>
        <input id="phone" name="phone" type="number" required placeholder="Example: 01234567789">
        <br>
        <label for="password">Enter your Password:</label>
        <input id="password" name="password" required type="password" placeholder="Password">
        <br>
        <label for="password-2">Confirm your Password:</label>
        <input id="password-2" name="password" required type="password" placeholder="Password">
        <br>

       <section align="center">
         <input type="submit" value="Register">
        </section>
        </form>
         
        
</body>
</html>
