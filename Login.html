<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login Page</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body id="login"  style="background: linear-gradient(135deg, #160577, #ec0b0b);" >
    <section align="center">
      <h1>"Login Page"</h1>
    </section>
    <form>
      <!--login page need data like: email,password & option about the password and create new account-->
      <label for="Email">Enter your Email:</label>
      <input
        id="Email"
        name="email"
        type="email"
        required
        placeholder="Example: ABC@gmail.com"
      />
      <br /><br />
      <label for="password">Enter your Password:</label>
      <input
        id="password"
        name="password"
        required
        type="password"
        placeholder="Password"
      />
      <br /><br />
      <section align="center">
        <button><a href="cv.html">Login to See your CV</a></button>
      </section>
    </form>
    <hr>
    <p id="one">
      <b
        >Are you Forget Your Password ?<a href="#" target="_blank"
          >Reset Your Password</a
        >
      </b>
    </p>
    <hr>
    <p id="two">
      <b
        >If you don't have Account
        <a href="register.html" target="_blank">Create Account</a></b
      >
    </p>
    <hr>
  </body>
</html>
